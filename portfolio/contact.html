<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Surabhi Patel</title>
    <meta name="description" content="Contact Surabhi Patel for growth marketing consulting and campaign support." />
    <meta property="og:title" content="Contact | Surabhi Patel" />
    <meta property="og:description" content="Book a discovery call and discuss your growth goals." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/contact.html" />
    <meta property="og:image" content="https://example.com/assets/images/og-cover.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="contact">
    <a class="sr-only" href="#main-content">Skip to content</a>
    <div id="site-header"></div>

    <main id="main-content">
      <section class="section">
        <div class="container reveal">
          <span class="badge">Contact</span>
          <h1 class="section-title">Let's build your next growth phase</h1>
          <p class="section-lead">Tell me about your goals, current bottlenecks, and timeline. I will get back within 1-2 business days.</p>
        </div>
      </section>

      <section class="section">
        <div class="container grid grid-2">
          <article class="card reveal">
            <h2>Send a message</h2>
            <form id="contact-form" novalidate aria-label="Contact form">
              <label for="name">Name</label>
              <input id="name" name="name" type="text" required autocomplete="name" />

              <label for="email" style="margin-top: .8rem; display:block;">Email</label>
              <input id="email" name="email" type="email" required autocomplete="email" />

              <label for="message" style="margin-top: .8rem; display:block;">Message</label>
              <textarea id="message" name="message" required></textarea>

              <button type="submit" class="btn btn-primary" style="margin-top: .9rem;">Submit</button>
              <p id="form-status" role="status" aria-live="polite"></p>
            </form>
          </article>
          <article class="card reveal">
            <h2>Connect</h2>
            <p>Email: <a href="mailto:hello@surabhiportfolio.com">hello@surabhiportfolio.com</a></p>
            <p>Location: Bengaluru, India (placeholder)</p>
            <p><a href="#" class="btn btn-secondary" aria-label="Open Calendly scheduling link">Book via Calendly</a></p>
            <div class="social-links" style="margin-top: 1rem;">
              <a href="#" aria-label="LinkedIn">in</a>
              <a href="#" aria-label="Instagram">ig</a>
              <a href="#" aria-label="X">x</a>
              <a href="#" aria-label="YouTube">yt</a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="js/main.js" defer></script>
  </body>
</html>
